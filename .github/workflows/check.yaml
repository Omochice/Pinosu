name: Code check

on:
  push: null
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  path-filter:
    timeout-minutes: 5
    outputs:
      # keep-sorted start
      actions: ${{steps.changes.outputs.actions}}
      android: ${{steps.changes.outputs.android}}
      devbox: ${{steps.changes.outputs.devbox}}
      renovate: ${{steps.changes.outputs.renovate}}
      version: ${{steps.changes.outputs.version}}
      # keep-sorted end
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          filters: |
            actions:
              - .github/workflows/*.yaml
              - devbox.json
              - devbox.lock
            android:
              - build.gradle.kts
              - settings.gradle.kts
              - gradle/**/*
              - gradle.properties
              - gradlew
              - gradlew.bat
              - app/**/*
              - devbox.json
              - devbox.lock
            devbox:
              - devbox.lock
            renovate:
              - renovate.json5
              - devbox.json
              - devbox.lock
            version:
              - version.json
  check-actions:
    needs: path-filter
    if: needs.path-filter.outputs.actions == 'true'
    timeout-minutes: 10
    name: Check github actions files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: true
      - run: devbox run actionlint
      - run: devbox run ghalint run
      - run: devbox run zizmor .github/
  check-format:
    timeout-minutes: 10
    name: Check code format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: true
      - run: devbox run fmt
      - run: git diff --exit-code
  check-android:
    timeout-minutes: 10
    needs: path-filter
    if: needs.path-filter.outputs.android == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: true
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - run: devbox run check
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: lint-reports
          path: app/build/reports/
  test-android:
    timeout-minutes: 30
    name: Test Android code
    needs: path-filter
    if: needs.path-filter.outputs.android == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: true
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Run unit tests with coverage
        run: devbox run ./gradlew testDebugUnitTest koverXmlReportDebug
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: kover-coverage
          path: app/build/reports/kover/reportDebug.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: reports
          path: app/build/reports/
  instrumentation-test:
    timeout-minutes: 40
    name: Test Android E2E
    needs: path-filter
    if: needs.path-filter.outputs.android == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: true
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run instrumented tests with coverage
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel
          disable-animations: true
          script: devbox run ./gradlew :app:connectedDebugAndroidTest :app:jacocoInstrumentationTestReport --stacktrace
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: jacoco-coverage
          path: app/build/reports/jacoco/jacocoInstrumentationTestReport/jacocoInstrumentationTestReport.xml
  build-apk:
    timeout-minutes: 20
    name: Build Android APK
    needs: path-filter
    if: needs.path-filter.outputs.android == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: true
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - run: devbox run ./gradlew assembleDebug
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
  check-renovate:
    timeout-minutes: 10
    name: Check Renovate config
    needs: path-filter
    if: needs.path-filter.outputs.renovate == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: true
      - run: devbox run renovate-config-validator --strict
  check-devbox:
    timeout-minutes: 10
    name: Check devbox ${{ matrix.name }}
    needs: path-filter
    if: needs.path-filter.outputs.devbox == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
          - os: ubuntu-24.04-arm
            name: Linux ARM64
          - os: macos-latest
            name: macOS ARM64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: true
      - run: devbox run echo "ok"
  check-version-code:
    timeout-minutes: 5
    name: Check versionCode increment
    needs: path-filter
    if: needs.path-filter.outputs.version == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Check versionCode is incremented
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          PR_VERSION_CODE=$(jq -r '.versionCode' version.json)
          BASE_VERSION_CODE=$(gh api "repos/${{ github.repository }}/contents/version.json?ref=${BASE_REF}" \
            --jq '.content' | base64 -d | jq -r '.versionCode')

          echo "PR versionCode: $PR_VERSION_CODE"
          echo "Base versionCode: $BASE_VERSION_CODE"

          if [[ "$PR_VERSION_CODE" -ge $((BASE_VERSION_CODE + 1)) ]]; then
            echo "versionCode is properly incremented"
            exit 0
          else
            echo "Error: versionCode must be incremented (expected >= $((BASE_VERSION_CODE + 1)), got $PR_VERSION_CODE)"
            exit 1
          fi
  coverage-report:
    timeout-minutes: 5
    name: Report Coverage
    needs:
      - path-filter
      - test-android
      - instrumentation-test
    if: |
      needs.path-filter.outputs.android == 'true' &&
      (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: write
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kover-coverage
          path: coverage/kover
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: jacoco-coverage
          path: coverage/jacoco
      - uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
        with:
          config: octocov.yaml
  status-check:
    timeout-minutes: 5
    name: Status Check
    runs-on: ubuntu-latest
    needs:
      # keep-sorted start
      - build-apk
      - check-actions
      - check-android
      - check-devbox
      - check-format
      - check-renovate
      - check-version-code
      - coverage-report
      - instrumentation-test
      - test-android
      # keep-sorted end
    permissions:
      actions: read
    if: always()
    steps:
      - uses: Kesin11/actions-timeline@7bf79990b7c09f5dfb570ac30b814ca597bd538e # v3.1.1
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
